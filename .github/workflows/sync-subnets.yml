name: Sync Subnets

on:
  schedule:
    - cron: "17 5,17 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-subnets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install
        run: npm ci

      - name: Sync native subnet snapshot
        run: npm run sync:subnets

      - name: Discover candidate surfaces
        run: npm run discover:candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify candidate surfaces
        run: npm run verify:candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Curate baseline overlays
        run: npm run curate:baseline

      - name: Apply maintainer review decisions
        run: npm run review:promote

      - name: Snapshot subnet adapters
        run: npm run adapters:snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build artifacts
        run: npm run build

      - name: Snapshot OpenAPI schemas
        run: npm run schemas:snapshot

      - name: Probe curated surfaces
        run: npm run probes:smoke
        env:
          METAGRAPH_WRITE_PROBE_RESULTS: "1"

      - name: Generate R2 manifest
        run: npm run r2:manifest

      - name: Validate registry
        run: npm run validate

      - name: Test
        run: npm test

      - name: Validate JSON schemas
        run: npm run validate:schemas

      - name: Validate Worker API
        run: npm run validate:api

      - name: Validate intake templates
        run: npm run validate:intake

      - name: Validate workflows
        run: npm run validate:workflows

      - name: Validate R2 manifest
        run: npm run r2:manifest:dry-run

      - name: Public-safety scan
        run: npm run scan:public-safety

      - name: Generate sync summary
        run: npm run sync:summary > "$RUNNER_TEMP/metagraphed-sync-summary.md"

      - name: Open sync pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/sync-subnets
          delete-branch: true
          title: "chore(sync): refresh subnet registry data"
          commit-message: "chore(sync): refresh subnet registry data"
          body-path: ${{ runner.temp }}/metagraphed-sync-summary.md
