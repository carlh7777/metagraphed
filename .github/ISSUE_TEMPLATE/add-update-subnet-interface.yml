name: Add or update subnet interface
description: Submit a public subnet API, docs, dashboard, OpenAPI, SSE, repository, or data artifact candidate.
title: "interface: "
labels:
  - interface-submission
  - metagraphed-under-review
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Metagraphed. Use this issue path when you want a low-friction review/import request. Schema-valid issues are not auto-published; approved issue imports require the `metagraphed-import-approved` label and open a pull request. If you want the fastest path for a simple public-safe interface, open a direct PR with exactly one `registry/candidates/community/*.json` file instead.
  - type: input
    id: netuid
    attributes:
      label: Netuid
      description: Bittensor subnet netuid for this interface.
      placeholder: "7"
    validations:
      required: true
  - type: input
    id: subnet_name
    attributes:
      label: Subnet name
      placeholder: Allways
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Interface kind
      options:
        - archive
        - website
        - source-repo
        - subnet-api
        - openapi
        - sse
        - sdk
        - example
        - dashboard
        - repo-registry
        - docs
        - data-artifact
        - subtensor-rpc
        - subtensor-wss
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Public URL
      description: The exact public interface URL to list or update.
      placeholder: https://example.com/api
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Source URL
      description: Public docs, repository, or announcement supporting the interface claim.
      placeholder: https://docs.example.com/api
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider or team
      placeholder: example-team
    validations:
      required: true
  - type: dropdown
    id: auth_required
    attributes:
      label: Does this interface require authentication?
      options:
        - "no"
        - "yes"
        - "unknown"
    validations:
      required: true
  - type: textarea
    id: rate_limits
    attributes:
      label: Rate limits or access notes
      description: Include public rate-limit notes, API-key requirements, or known access constraints.
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: This submission does not include secrets, credentialed flows, private dashboards, or validator-sensitive data.
          required: true
        - label: The submitted URL can be checked with read-only probes.
          required: true
        - label: I understand issue submissions create review/import work and do not directly publish registry data.
          required: true
